<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proverbs Study Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --maroon: #6b1025;
      --maroon-dark: #560c1d;
      --bg: #ffffff;
      --text: #1f2937;
      --muted: #5f6b7a;
      --border: #e4e7ec;
      --surface: #ffffff;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, sans-serif; background: var(--bg); color: var(--text); }
    .page-header { background: var(--maroon); color: #fff; }
    .header-inner { max-width: 920px; margin: 0 auto; padding: 1rem 1.25rem; display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
    .brand { font-weight: 700; letter-spacing: -0.01em; }
    .back-link { color: #ffd8df; text-decoration: none; font-weight: 600; padding: 0.45rem 0.85rem; border-radius: 999px; border: 1px solid rgba(255,255,255,0.22); }
    .back-link:hover { color: #fff; background: rgba(255,255,255,0.12); }
    main { max-width: 920px; margin: 2.2rem auto; padding: 0 1.25rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 2rem; box-shadow: 0 12px 30px rgba(15, 23, 42, 0.06); }
    h1 { margin: 0 0 0.8rem; font-size: clamp(1.7rem, 4vw, 2.2rem); }
    p { margin: 0; color: var(--muted); line-height: 1.7; }
    .page-footer { margin-top: 3rem; background: var(--maroon-dark); color: #f5b8c5; text-align: center; padding: 1rem 1.25rem; font-size: 0.92rem; }
  </style>
</head>
<body>
  <header class="page-header">
    <div class="header-inner">
      <div class="brand">Concordia Bible Institute</div>
      <a class="back-link" href="../index.html">← Back to Library</a>
    </div>
  </header>

  <main>
    <article class="card">
      <h1>Proverbs Study Guide</h1>
      <p>This guide page is ready for deeper content, discussion prompts, and chapter-by-chapter notes for the book of Proverbs.</p>
    </article>
  </main>

  <footer class="page-footer">© Concordia Bible Institute</footer>
</body>
</html>
