<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Explore a modern React-powered Concordia Bible Institute study guide library." />
  <title>Concordia Study Guide Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif']
          },
          boxShadow: {
            glow: '0 0 0 1px rgba(255,255,255,0.08), 0 24px 42px rgba(111, 16, 39, 0.42)'
          },
          animation: {
            'float-slow': 'floatSlow 9s ease-in-out infinite',
            'pulse-soft': 'pulseSoft 5s ease-in-out infinite',
            'fade-up': 'fadeUp .8s ease-out both',
            marquee: 'marquee 28s linear infinite'
          },
          keyframes: {
            floatSlow: {
              '0%, 100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-14px)' }
            },
            pulseSoft: {
              '0%, 100%': { opacity: .7, transform: 'scale(1)' },
              '50%': { opacity: 1, transform: 'scale(1.07)' }
            },
            fadeUp: {
              from: { opacity: 0, transform: 'translateY(12px)' },
              to: { opacity: 1, transform: 'translateY(0)' }
            },
            marquee: {
              '0%': { transform: 'translateX(0)' },
              '100%': { transform: 'translateX(-50%)' }
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-950 text-slate-100 antialiased">
  <div id="app"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" src="app.js"></script>
</body>
</html>
