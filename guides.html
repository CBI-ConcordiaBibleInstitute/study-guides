<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Browse all Concordia Bible Institute study guides in one place." />
  <title>All Study Guides | Concordia Bible Institute</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="guides-index">
  <div class="scroll-progress" id="scrollProgress" aria-hidden="true"></div>

  <header class="site-header" id="top">
    <div class="container nav-wrap">
      <a class="logo header-brand" href="index.html" aria-label="Bible Study Guide Library home">
        <img src="images/concordia-logo.svg" alt="Concordia Bible Institute logo" class="header-logo" />
        <span class="brand-text">CBI StudyGuide Library</span>
      </a>
      <nav aria-label="Primary">
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="#study-guides">Study Guides</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="library section" id="study-guides">
      <div class="container">
        <div class="section-heading reveal reveal-up">
          <p class="eyebrow">Library</p>
          <h1>All Study Guides</h1>
          <p>Search and filter the full Concordia Bible Institute guide library. Every guide is displayed on this page.</p>
        </div>

        <div class="controls reveal reveal-left">
          <label class="search-wrap" for="guideSearch">
            <span class="sr-only">Search guides</span>
            <input id="guideSearch" type="search" placeholder="Search by guide, topic, or learning track..." autocomplete="off" />
          </label>

          <div class="category-filters" role="group" aria-label="Guide category filters">
            <button class="filter-btn active" data-category="all">All Guides</button>
            <button class="filter-btn" data-category="old-testament">Old Testament</button>
            <button class="filter-btn" data-category="new-testament">New Testament</button>
          </div>
        </div>

        <div class="library-summary reveal reveal-right">
          <div>
            <p class="summary-label">Current View</p>
            <h3 id="guideSummaryHeading">Showing all study guides</h3>
            <p id="guideSummaryText">Click any card to open its full study guide page directly.</p>
          </div>
          <button class="more-button" id="moreGuidesButton" type="button" aria-expanded="true" hidden>More Study Guides</button>
        </div>

        <div class="guide-grid" id="guideGrid" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
